<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS导入方式</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS样式 */
        p {
            color: blue;
            font-size: 16px;
        }

        h2 {
            color: red;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <p>这是一个使用CSS导入方式的段落。</p>
    <h1 style="color: green; font-size: 20px;">使用内联样式</h1>
    <h2>使用内部样式表</h2>
    <h3>使用外部样式表</h3>

</body>

</html>
