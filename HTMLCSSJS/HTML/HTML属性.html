<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html属性</title>
</head>

<body>
    <!--HTML属性示例-->
    <h1 style="color:blue;">带有内联样式的标题</h1>
    <p class="text" id="paragraph1">这是一个段落，具有class和id属性。</p>
    <!--a标签超链接示例-->
    <!--target="_blank"属性使链接在新窗口打开-->
    <!--target="_self"属性使链接在当前窗口打开-->
    <!--target="_parent"属性使链接在父窗口打开-->
    <!--target="_top"属性使链接在当前上下文的最高级别上下文打开-->
    <!--href属性指定链接地址-->
    <a href="https://www.example.com" target="_blank">这是一个链接，点击打开新窗口</a>
    <br><!--使用<br>标签换行-->
    <a href="https://www.example.com" target="_self">这是一个链接，点击在当前窗口打开</a>
    <hr><!--水平线标签-->
    <!--img标签示例，src属性指定图片地址，alt属性提供替代文本，title属性提供鼠标悬停提示，width和height属性设置图片尺寸-->
    <img src="https://via.placeholder.com/150" alt="示例图片" title="这是一个示例图片" width="150" height="150">
</body>

</html>
