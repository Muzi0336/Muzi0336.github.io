<!--
    HTML5 新增标签
    1. details/summary: 折叠面板
    2. dialog: 对话框
    3. progress: 进度条
    4. meter: 度量衡（如评分、容量）
    5. mark: 高亮文本
    6. time: 时间
    7. canvas: 画布（JS绘图）
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5新增标签</title>
    <style>
        dialog { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        dialog::backdrop { background: rgba(0,0,0,0.5); }
    </style>
</head>

<body>

    <h1>折叠面板 details/summary</h1>

    <!-- details: 折叠容器 -->
    <!-- summary: 折叠标题（点击展开/收起） -->
    <details>
        <summary>点击展开更多信息</summary>
        <p>这是隐藏的内容，点击标题可以展开或收起。</p>
        <p>不需要任何JavaScript就能实现折叠效果！</p>
    </details>

    <details open>
        <summary>默认展开的面板</summary>
        <p>这个面板打开时就是展开状态（open属性）。</p>
    </details>

    <br><br>

    <h1>对话框 dialog</h1>

    <!-- dialog: 对话框 -->
    <!-- open 属性：显示对话框 -->
    <button onclick="document.getElementById('myDialog').showModal()">打开对话框</button>

    <dialog id="myDialog">
        <h3>提示</h3>
        <p>这是一个原生对话框</p>
        <button onclick="this.closest('dialog').close()">关闭</button>
    </dialog>

    <br><br>

    <h1>进度条 progress</h1>

    <!-- progress: 表示任务进度 -->
    <!-- value: 当前值 -->
    <!-- max: 最大值 -->
    <p>下载进度：</p>
    <progress value="70" max="100"></progress> 70%

    <br><br>

    <p>未知进度（加载中）：</p>
    <progress></progress>

    <br><br>

    <h1>度量衡 meter</h1>

    <!-- meter: 表示某个范围内的标量值 -->
    <!-- min/max: 范围 -->
    <!-- low/high: 低/高阈值 -->
    <!-- optimum: 最优值 -->
    <p>磁盘使用率：</p>
    <meter min="0" max="100" low="30" high="70" optimum="20" value="85">85%</meter>

    <br><br>

    <p>考试成绩：</p>
    <meter min="0" max="100" low="60" high="90" optimum="100" value="92">92分</meter>

    <br><br>

    <h1>高亮文本 mark</h1>

    <!-- mark: 高亮显示文本（默认黄色背景） -->
    <p>这是一段文字，其中<mark>这部分被高亮</mark>了。</p>

    <br><br>

    <h1>时间标签 time</h1>

    <!-- time: 表示时间/日期 -->
    <!-- datetime 属性：机器可读的时间格式 -->
    <p>发布于 <time datetime="2026-06-05">今天</time></p>

    <p>会议时间 <time datetime="2026-06-05T14:00:00">下午2点</time></p>

    <br><br>

    <h1>画布 canvas（需要JS）</h1>

    <!-- canvas: 画布，用于JS绘制图形 -->
    <!-- width/height: 画布尺寸 -->
    <canvas id="myCanvas" width="400" height="200" style="border:1px solid #ccc;"></canvas>

    <script>
        // 用JS在canvas上画一个矩形和圆
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');

        // 画矩形
        ctx.fillStyle = 'lightblue';
        ctx.fillRect(20, 20, 150, 80);

        // 画圆
        ctx.beginPath();
        ctx.arc(300, 60, 40, 0, Math.PI * 2);
        ctx.fillStyle = 'lightcoral';
        ctx.fill();

        // 画文字
        ctx.fillStyle = 'black';
        ctx.font = '16px Arial';
        ctx.fillText('Canvas 画布', 20, 140);
    </script>

</body>

</html>
