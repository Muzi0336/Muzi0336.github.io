<!--
    常见文本标签
    1.标题标签：h1-h6
    2.段落标签：p
    3.文本格式标签：b、i、u、s
    4.列表标签：ul、ol、li
    5.表格标签：table、tr、th、td
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- meta标签用于指定文档的元数据，charset属性指定文档的字符编码，viewport属性用于控制页面在移动设备上的显示和缩放 -->
    <meta charset="UTF-8">
    <!-- viewport属性的content属性值设置为width=device-width表示页面宽度与设备宽度相同，initial-scale=1.0表示初始缩放比例为1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常见文本标签</title>
</head>

<body>
    <!-- h1-h6:是标题元素，用于定义不同级别的标题，h1表示最高级别的标题，h6表示最低级别的标题 -->
    <!--HTML标签示例-->
    <h1>一级标题标签</h1>
    <h2>二级标题标签</h2>
    <h3>三级标题标签</h3>
    <h4>四级标题标签</h4>
    <h5>五级标题标签</h5>
    <h6>六级标题标签</h6>
    <p>段落标签</p>
    <!--文本格式示例-->
    <!--b:加粗文本标签-->
    <!--i:斜体文本标签-->
    <!--u:下划线文本标签-->
    <!--s:删除线文本标签-->
    <p>文本演示，<b>加粗</b> <i>斜体</i> <u>下划线</u> <s>删除线</s>
    </p>
    <!--无序列表-->
    <!--ul:无序列表标签，li:列表项标签-->
    <ul>
        <li>无序列表项1</li>
        <li>无序列表项2</li>
        <li>无序列表项3</li>
    </ul>
    <!--有序列表-->
    <!--ol:有序列表标签，li:列表项标签-->
    <ol>
        <li>有序列表项1</li>
        <li>有序列表项2</li>
        <li>有序列表项3</li>
    </ol>
    <!--表格-->
    <!--border属性设置表格边框为1像素-->
    <!--table:表格标签，tr:表格行标签，th:表头单元格标签，td:表格数据单元格标签-->
    <table border="1">
        <tr>
            <th>表头1</th>
            <th>表头2</th>
            <th>表头3</th>
        </tr>
        <tr>
            <td>列1</td>
            <td>列2</td>
            <td>列3</td>
        </tr>
        <tr>
            <td>2列1</td>
            <td>2列2</td>
            <td>2列3</td>
        </tr>
    </table>
</body>

</html>
