<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块</title>
</head>
<!-- 区块是HTML中的一个重要概念，它可以包含其他元素，并且可以设置样式和布局 -->
<!-- 下面是一个简单的HTML区块示例 -->
<!--body:是HTML文档的主体部分，包含了页面的内容和结构，是浏览器渲染页面的主要区域-->

<body>
    <!-- div:是一个常用的区块元素，用于将内容分组，并且可以通过CSS来设置样式和布局 -->
    <!-- class:是一个全局属性，用于为元素指定一个或多个类名，可以通过CSS来选择和样式化这些类 -->
    <div class="navbar">
        <!-- a:是一个超链接元素，用于创建链接，可以通过href属性来指定链接的目标地址 -->
        <!-- href:是a标签的一个属性，用于指定链接的目标地址 -->
        <a href="#">链接</a>
    </div>
    <div class="block">
        <h2>这是一个区块</h2>
        <!-- p:是段落元素，用于定义文本段落 -->
        <p>区块是HTML中的一个重要概念，它可以包含其他元素，并且可以设置样式和布局。</p>
    </div>
    <div class="content">
        <h6>内容区域</h6>
        <p>这里是内容区域。</p>
    </div>
    <!-- 下面是一些行内元素的示例 -->
    <!-- inline:是HTML中的一个重要概念，行内元素不会在页面上产生换行，可以与其他元素在同一行显示 -->
    <span class="inline">这是一个行内元素</span>
    <span class="inline">这是另一个行内元素</span>
    <span class="inline">这是第三个行内元素</span>
    <br>
    <span>链接<a href="#">点击这里</a></span>
</body>

</html>
