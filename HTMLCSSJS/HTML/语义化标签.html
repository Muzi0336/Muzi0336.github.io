<!--
    语义化标签
    1. 什么是语义化：用有含义的标签代替无意义的div
    2. 为什么用语义化：SEO友好、代码可读性高、无障碍访问
    3. 常用语义化标签：header、nav、main、footer、article、section、aside
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语义化标签</title>
    <style>
        /* 简单样式，方便观察布局 */
        header, footer, nav, main, article, section, aside {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px;
        }
        header { background: #f0f0f0; }
        nav { background: #e0e0e0; }
        main { display: flex; }
        article { flex: 2; background: #fff; }
        aside { flex: 1; background: #f8f8f8; }
        footer { background: #f0f0f0; text-align: center; }
    </style>
</head>

<body>

    <!-- header: 页面或区块的头部，通常放logo、标题、导航 -->
    <header>
        <h1>我的网站</h1>
    </header>

    <!-- nav: 导航栏，放主要导航链接 -->
    <nav>
        <a href="#">首页</a> |
        <a href="#">关于</a> |
        <a href="#">联系</a>
    </nav>

    <!-- main: 页面主体内容，一个页面只有一个main -->
    <main>
        <!-- article: 独立的内容块，可以单独发布（如文章、博客、新闻） -->
        <article>
            <h2>文章标题</h2>
            <p>这是一篇独立的文章内容...</p>

            <!-- section: 文档中的节，用于分组相关内容 -->
            <section>
                <h3>第一章</h3>
                <p>第一章的内容...</p>
            </section>

            <section>
                <h3>第二章</h3>
                <p>第二章的内容...</p>
            </section>
        </article>

        <!-- aside: 侧边栏内容，与主内容相关但可独立（如广告、相关链接） -->
        <aside>
            <h3>相关推荐</h3>
            <ul>
                <li><a href="#">推荐文章1</a></li>
                <li><a href="#">推荐文章2</a></li>
            </ul>
        </aside>
    </main>

    <!-- footer: 页面或区块的底部，通常放版权、联系方式 -->
    <footer>
        <p>&copy; 2026 我的网站 版权所有</p>
    </footer>

</body>

</html>
