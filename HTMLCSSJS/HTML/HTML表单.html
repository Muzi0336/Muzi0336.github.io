<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html表单</title>
</head>
<body>
    <!-- 表单是一个HTML元素，包含了各种输入控件，用户可以在其中输入数据，并将数据提交到服务器 -->
    <!-- action:指定表单数据提交的URL地址 -->
    <!-- method:指定表单数据提交的HTTP方法，常用的有GET和POST -->
    <!-- GET:将表单数据附加在URL后面，适用于获取数据的请求，数据量较小，安全性较低 -->
    <!-- POST:将表单数据放在HTTP请求的正文中，适用于提交数据的请求，数据量较大，安全性较高 -->
    <!-- label:标签元素，用于为输入控件提供描述文本 -->
    <!-- for:指定标签关联的输入控件的id属性值 -->
    <!-- input:输入控件元素，用于接收用户输入的数据 -->
    <form action="#" method="post">
        <label for="username">用户名:</label>
        <!-- type:指定输入框的类型 -->
        <!-- name:指定输入控件的名称，提交表单时会将该名称和值一起发送到服务器 -->
        <!-- id:指定输入控件的唯一标识符，可以通过标签的for属性来关联标签和输入控件 -->
        <!-- placeholder:提供输入提示文本，当输入框为空时显示 -->
        <!-- value:指定输入控件的默认值 -->
        <!-- required:表示该输入控件是必填的，用户必须填写才能提交表单 -->
        <!-- disabled:表示该输入控件被禁用，用户无法与之交互 -->
        <!-- readonly:表示该输入控件是只读的，用户可以看到但无法修改其值 -->
        <!-- maxlength:指定输入控件允许输入的最大字符数 -->
        <!-- minlength:指定输入控件允许输入的最小字符数 -->
        <!-- pattern:指定输入控件的值必须匹配的正则表达式 -->
        <!-- autocomplete:指定输入控件是否启用自动完成功能 -->
        <!-- autofocus:表示该输入控件在页面加载时自动获得焦点 -->
        <!-- id:是一个全局属性，用于为元素指定一个唯一的标识符，可以通过CSS和JavaScript来选择和操作这个元素 -->
        <input type="text" id="username" name="username"><br><br>
        <label for="password">密码:</label>
        <input type="password" id="password" name="password"><br><br>
        <!-- type:指定输入框的类型 -->
        <!-- value:是按钮上显示的文本 -->
        <!-- submit:提交按钮，点击后会将表单数据发送到服务器 -->
        <!-- reset:重置按钮，点击后会清空表单中的所有输入 -->
        <!-- button:普通按钮，点击后不会有任何默认行为，可以通过JavaScript来实现自定义功能 -->
        <input type="submit" value="登录">
    </form>
    <form>
        <!-- 这是一个输入框，用户可以在其中输入文本 -->
        <!-- span:是一个行内元素，用于将文本或其他行内元素分组，并且可以通过CSS来设置样式 -->
        <span>请输入用户名:</span>
        <input type="text" placeholder="请输入用户名"><br><br>
        <span>请输入密码:</span>
        <input type="password" placeholder="请输入密码"><br><br>
        <!-- 这是一个单选框，用户可以选择一个选项 -->
        <input type="radio" name="gender">
        <label name="gender">男</label>
        <input type="radio" name="gender">
        <label name="gender">女</label>
        <input type="radio" name="gender">
        <label name="gender">其他</label>
        <br><br>
        <!-- 这是一个复选框，用户可以选择多个选项 -->
        <input type="checkbox" name="hobby">
        <label name="hobby">篮球</label>
        <input type="checkbox" name="hobby">
        <label name="hobby">足球</label>
        <input type="checkbox" name="hobby">
        <label name="hobby">游泳</label>
    </form>
</body>
</html>
